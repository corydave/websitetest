<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | FLX AI Hub</title>
    <link rel="icon" type="image/x-icon" href="images/HubLogo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Montserrat:wght@400;600;700;800&family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="shared.css">

    <style>
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .event-card {
            display: flex;
            background: white;
            border-radius: var(--radius);
            border: 1px solid #e8eaed;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow 0.25s, transform 0.25s;
        }

        .event-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-3px);
        }

        .event-card-img-wrap {
            width: 260px;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(0,70,173,0.08), rgba(88,166,24,0.08));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-blue);
            overflow: hidden;
        }

        .event-card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .event-card-body {
            padding: 1.75rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;
        }

        .event-badge {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.2rem 0.65rem;
            border-radius: var(--radius-pill);
            align-self: flex-start;
        }

        .event-badge.upcoming {
            background: #f0fdf4;
            color: var(--primary-green);
        }

        .event-badge.past {
            background: #f3f4f6;
            color: var(--neutral-gray);
        }

        .event-card-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--dark-gray);
            line-height: 1.25;
            margin: 0;
        }

        .event-card-details {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.25rem;
            font-size: 0.855rem;
            color: var(--neutral-gray);
        }

        .event-card-details span {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .event-card-desc {
            font-size: 0.935rem;
            color: #6b7280;
            line-height: 1.7;
            margin: 0.25rem 0 0;
            flex: 1;
        }

        .event-card-actions {
            margin-top: 0.75rem;
        }

        /* Past card: slightly muted */
        .event-card.is-past {
            opacity: 0.82;
        }

        .event-card.is-past:hover {
            opacity: 1;
        }

        /* Section divider between upcoming and past */
        .events-section-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--neutral-gray);
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e8eaed;
        }

        .events-section-label:first-child { margin-top: 0; }

        @media (max-width: 700px) {
            .event-card { flex-direction: column; }
            .event-card-img-wrap {
                width: 100%;
                height: 180px;
            }
            .event-card-body { padding: 1.25rem 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>
    <script>window.BASE_PATH = ''; window.ACTIVE_PAGE = 'what-we-do';</script>
    <script src="navbar.js"></script>

    <!-- Hero -->
    <section class="page-hero">
        <div class="container">
            <span class="section-label">What We Do</span>
            <h1>Events</h1>
            <p class="hero-sub">Workshops, webinars, and community gatherings across the Finger Lakes region — practical AI education, in person and online.</p>
        </div>
    </section>

    <!-- Events -->
    <section class="page-section">
        <div class="container">
            <div id="events-list" class="events-list"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container footer-inner">
            <a href="index.html" class="footer-logo">
                <img src="images/HubLogo.png" alt="FLX AI Hub Logo">
                <div class="logo-text">
                    <span class="logo-title">FLX AI Hub</span>
                    <span class="logo-sub">Innovate &amp; Educate</span>
                </div>
            </a>
            <p class="footer-copy">&copy; <span id="footer-year"></span> The FLX AI Hub. All rights reserved.</p>
        </div>
    </footer>

    <script defer src="https://static.cloudflareinsights.com/beacon.min.js/vcd15cbe7772f49c399c6a5babf22c1241717689176015" integrity="sha512-ZpsOmlRQV6y907TI0dKBHq9Md29nnaEIPlkf84rnaERnq6zvWvPUqr2ft8M1aS28oN72PdrCzSjY4U6VaAw1EQ==" data-cf-beacon='{"version":"2024.11.0","token":"1f4307355f984a529a180c0bd298a86a","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
    <script>
        /**
         * EVENTS DATA
         * ===========
         * Add or edit events here. They are sorted automatically — upcoming first, then past.
         *
         * Fields:
         *   title       (string)  — Event name
         *   date        (string)  — ISO date "YYYY-MM-DD", used for sorting and past/upcoming logic
         *   dateDisplay (string)  — Human-readable date shown on the card, e.g. "March 10, 2026"
         *   time        (string)  — e.g. "2:00 PM – 3:30 PM ET"  (leave "" to omit)
         *   location    (string)  — e.g. "Online (Zoom)" or "FLCC, Geneva NY"
         *   description (string)  — Short paragraph shown on the card
         *   signupUrl   (string)  — Registration link; leave "" for past events with no recording
         *   signupLabel (string)  — Button text, e.g. "Register Now" or "Watch Recording"
         *   image       (string)  — Path to image relative to this file, or "" for placeholder icon
         */
        const events = [
            {
                title:       'AI for Marketing and Communication',
                date:        '2026-03-19',
                dateDisplay: 'March 19, 2026',
                time:        '8:00 AM – 1:30 PM',
                location:    'FLCC',
                description: 'Join us for a free half-day workshop for marketing professionals, communicators, and business leaders. Whether you\'re a small business owner who handles your own marketing, work at an agency, or are part of an organization\'s in-house team, everyone will leave with practical advice on how to use AI to strengthen your communication strategies.',
                signupUrl:   'https://flcc.formstack.com/forms/ai_for_marketing_and_communications',
                signupLabel: 'Register Now',
                image:       '',
            },
            {
                title:       'FLX AI Hub Community Convening',
                date:        '2026-06-10',
                dateDisplay: 'June 10, 2026',
                time:        '8:00 AM – 1:00 PM',
                location:    'FLCC',
                description: 'The FLX AI Hub will address the state of AI in the workplace with a new series of talks and workshops. The next FLX AI Hub community convening is scheduled for Wednesday, June 10, from 8 a.m. to 1 p.m. at the FLCC main campus. The schedule and registration details will be available in spring 2026.',
                signupUrl:   'https://www.flcc.edu/events/all-events/2026/june/flx-ai-hub-community-convening.php',
                signupLabel: 'Save the date',
                image:       '',
            },
        ];

        // -----------------------------------------------------------------------
        // Rendering — no edits needed below this line
        // -----------------------------------------------------------------------
        const today = new Date().toISOString().slice(0, 10);

        const upcoming = events.filter(e => e.date >= today).sort((a, b) => a.date.localeCompare(b.date));

        function cardHTML(ev) {
            const imgBlock = ev.image
                ? `<img src="${ev.image}" alt="${ev.title}">`
                : `<i data-lucide="calendar-days" width="56" style="opacity:0.25;"></i>`;

            const timeDetail = ev.time
                ? `<span><i data-lucide="clock" width="13"></i> ${ev.time}</span>` : '';

            const cta = ev.signupUrl
                ? `<a href="${ev.signupUrl}" class="btn btn-primary" style="font-size:0.875rem; padding:0.6rem 1.4rem;" target="_blank" rel="noopener">
                       ${ev.signupLabel || 'Register Now'}
                       <i data-lucide="arrow-right" width="15"></i>
                   </a>` : '';

            return `
                <div class="event-card">
                    <div class="event-card-img-wrap">${imgBlock}</div>
                    <div class="event-card-body">
                        <span class="event-badge upcoming">Upcoming</span>
                        <h2 class="event-card-title">${ev.title}</h2>
                        <div class="event-card-details">
                            <span><i data-lucide="calendar" width="13"></i> ${ev.dateDisplay}</span>
                            ${timeDetail}
                            <span><i data-lucide="map-pin" width="13"></i> ${ev.location}</span>
                        </div>
                        <p class="event-card-desc">${ev.description}</p>
                        <div class="event-card-actions">${cta}</div>
                    </div>
                </div>`;
        }

        const container = document.getElementById('events-list');

        if (upcoming.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>No events scheduled yet — check back soon.</p></div>';
        } else {
            container.innerHTML = upcoming.map(e => cardHTML(e)).join('');
        }

        lucide.createIcons();
        document.getElementById('footer-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>

    <style>
        /* ---- Initiatives section ---- */
        .initiatives {
            padding: 4.5rem 0;
            background: var(--light-bg);
        }

        .initiatives-layout {
            display: grid;
            grid-template-columns: 5fr 6fr;
            gap: 4rem;
            align-items: start;
            margin-top: 0;
        }

        .initiatives-right-wrap {
            position: sticky;
            top: 5rem;
        }

        .initiative-display {
            /* background: white; */
            border-radius: var(--radius);
            /* border: 2px dashed #d1d5db; */
            aspect-ratio: 16 / 9;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: opacity 0.2s ease;
        }

        .initiative-display.fading { opacity: 0; }

        .init-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            text-align: center;
            padding: 2.5rem;
            color: var(--neutral-gray);
        }

        .init-placeholder .ph-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            opacity: 0.55;
        }

        /* Accordion */
        .accordion-item { border-bottom: 1px solid #e8eaed; }
        .accordion-item:first-child { border-top: 1px solid #e8eaed; }

        .accordion-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 0;
            width: 100%;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark-gray);
            transition: color 0.2s;
            user-select: none;
        }

        .accordion-btn:hover { color: var(--primary-blue); }
        .accordion-btn.active { color: var(--primary-blue); }

        .accordion-chevron {
            flex-shrink: 0;
            color: var(--neutral-gray);
            transition: transform 0.3s ease;
        }

        .accordion-btn.active .accordion-chevron {
            transform: rotate(180deg);
            color: var(--primary-blue);
        }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }

        .accordion-body-inner {
            padding-bottom: 1.25rem;
            font-size: 0.925rem;
            color: #6b7280;
            line-height: 1.7;
        }

        .initiative-display-inline {
            display: none;
            margin-top: 1rem;
        }

        .init-launch-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 0.85rem;
            padding: 0.45rem 1rem;
            background: var(--primary-blue);
            color: white;
            border-radius: var(--radius-pill);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }

        .init-launch-chip:hover {
            background: #003d99;
            transform: translateY(-1px);
        }

        /* ---- Image Slider ---- */
        .img-slider {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: var(--radius);
        }
        .img-slider-track {
            display: flex;
            height: 100%;
            transition: transform 0.35s ease;
            will-change: transform;
        }
        .img-slider-track img {
            flex: 0 0 100%;
            width: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            border: none;
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: background 0.2s;
        }
        .slider-btn:hover { background: rgba(0,0,0,0.65); }
        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }
        .slider-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 7px;
            z-index: 2;
        }
        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: none;
            cursor: pointer;
            padding: 0;
            transition: background 0.2s, transform 0.2s;
        }
        .slider-dot.active {
            background: white;
            transform: scale(1.25);
        }

        @media (max-width: 900px) {
            .initiatives-layout {
                grid-template-columns: 1fr;
            }
            .initiatives-right {
                display: none;
            }
            .initiative-display-inline {
                display: flex;
            }
        }
    </style>
</head>

    <script defer src="https://static.cloudflareinsights.com/beacon.min.js/vcd15cbe7772f49c399c6a5babf22c1241717689176015" integrity="sha512-ZpsOmlRQV6y907TI0dKBHq9Md29nnaEIPlkf84rnaERnq6zvWvPUqr2ft8M1aS28oN72PdrCzSjY4U6VaAw1EQ==" data-cf-beacon='{"version":"2024.11.0","token":"1f4307355f984a529a180c0bd298a86a","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
    <script>
        /* ---- Slider helpers ---- */

        /**
         * makeSlider(images)
         * Returns an HTML string for an image slider. Use inside any contentHTML.
         * Each entry can be a plain string path or an {src, alt} object.
         * Example: contentHTML: makeSlider([
         *   { src: 'images/photo1.jpg', alt: 'Students at an AI workshop' },
         *   { src: 'images/photo2.jpg', alt: 'Faculty reviewing AI tools' },
         * ])
         */
        function makeSlider(images) {
            const multi = images.length > 1;
            const trackImgs = images.map(item => {
                const src = typeof item === 'string' ? item : item.src;
                const alt = typeof item === 'string' ? '' : (item.alt || '');
                return `<img src="${src}" alt="${alt}" draggable="false">`;
            }).join('');
            const btns = multi ? `
                <button class="slider-btn prev" onclick="sliderStep(this,-1)" aria-label="Previous">&#8249;</button>
                <button class="slider-btn next" onclick="sliderStep(this,1)" aria-label="Next">&#8250;</button>` : '';
            const dots = multi ? `
                <div class="slider-dots">${images.map((_, i) =>
                    `<button class="slider-dot${i === 0 ? ' active' : ''}" onclick="sliderGo(this,${i})" aria-label="Slide ${i + 1}"></button>`
                ).join('')}</div>` : '';
            return `<div class="img-slider" data-index="0">
                <div class="img-slider-track">${trackImgs}</div>
                ${btns}${dots}
            </div>`;
        }

        function _sliderUpdate(slider, index) {
            const count = slider.querySelectorAll('.img-slider-track img').length;
            index = ((index % count) + count) % count;
            slider.dataset.index = index;
            slider.querySelector('.img-slider-track').style.transform = `translateX(-${index * 100}%)`;
            slider.querySelectorAll('.slider-dot').forEach((d, i) => d.classList.toggle('active', i === index));
        }

        function sliderGo(el, index) {
            const slider = el.closest('.img-slider');
            if (slider) _sliderUpdate(slider, index);
        }

        function sliderStep(el, dir) {
            const slider = el.closest('.img-slider');
            if (slider) _sliderUpdate(slider, +slider.dataset.index + dir);
        }

        function initSliderAutoplay(container) {
            container.querySelectorAll('.img-slider').forEach(slider => {
                if (slider.querySelectorAll('.img-slider-track img').length <= 1) return;
                function start() {
                    slider._autoplayId = setInterval(() => _sliderUpdate(slider, +slider.dataset.index + 1), 2000);
                }
                function stop() { clearInterval(slider._autoplayId); }
                slider.addEventListener('mouseenter', stop);
                slider.addEventListener('mouseleave', start);
                start();
            });
        }

        function clearSliderAutoplay(container) {
            container.querySelectorAll('.img-slider').forEach(s => clearInterval(s._autoplayId));
        }

        function applyImgTitles(container) {
            container.querySelectorAll('img[alt]').forEach(img => { if (img.alt) img.title = img.alt; });
        }

        /**
         * INITIATIVES — Add/edit entries here to update the accordion section.
         *
         * Fields:
         *   title       - Shown as the accordion button label
         *   description - Paragraph shown when the item is open
         *   contentHTML - HTML rendered in the right-hand container (image, video, slider, etc.)
         *                 Use makeSlider(['img1.jpg', 'img2.jpg']) for an image slider.
         */
        const initiatives = [

                contentHTML: `<img src="images/wwd-ai-accessibility.png" alt="An illustrated infographic titled AI AS THE ACCESSIBLE ACCELERATOR displays a central AI POWERED TRANSFORMATION HUB where a diverse group of four people interacts with digital accessibility tools. On the left, a column labeled BEFORE shows problematic content like videos without captions or missing alt text, while the right side shows the AFTER result of fully captioned videos and structured documents with green checkmarks. The scene features FLCC branding and depicts various AI agents for alt text, captions, and readability checks being used to create inclusive digital content." />`
            },

                title: 'AI Challenge',
                description: 'The AI Challenge is a scaffolded series of hands-on activities, delivered by email or on the web, that guides participants through a variety of practical ways to use AI. Bring it to your organization for free!',

                contentHTML: makeSlider([

                    { src: 'images/wwd-ai-challenge-02.png',    alt: 'Screenshot of the AI Challenge - A challenge called IMAGINE IMAGES with text describing the challenge.' },
                    { src: 'images/wwd-ai-challenge-03.png',    alt: 'Screenshot of the AI Challenge - A description of generating images, a prompt, and the result.' },
                    { src: 'images/wwd-ai-challenge-04.png',    alt: 'Screenshot of the AI Challenge - A shared gallery of AI-generated images made by participants in the AI Challenge.' },
                ])
            },
            {
                title: 'AI Enhanced Initiatives',
                description: 'FLCC offers small honorariums to faculty and staff who design and share AI-enhanced lessons, learning experiences, workflows, and administrative processes, recognizing and rewarding the innovative work happening across campus.',
                link: '',
                contentHTML: `<img src="images/wwd-ai-enhanced-initiatives.png" alt="A circular logo on a white background features a stylized tree with blue circuit board lines for a trunk and branches, blooming into green and blue leaves with digital pixel patterns. The upper arc of the circle contains the text AI ENHANCED INITIATIVES in bold blue letters, while the lower arc reads FOR FACULTY AND STAFF FINGER LAKES COMMUNITY COLLEGE in green and blue. At the base of the tree trunk, the letters AI are integrated into the root design to ground the technological theme." />`
            },
            {
                title: 'AI Think Tank',
                description: 'The AI Think Tank is a steering committee with Instructional and Business work streams that sets goals for AI exploration across all college divisions, supports access to AI tools, and develops policy recommendations to guide the college\'s AI journey.',
                link: '',
                contentHTML: `<img src="images/wwd-ai-think-tank.png" alt="Org Chart for the AI Think Tank - Steering Committee has two work streams - Instructional and Business" />`
            },
            {

            {

                link: '',
                contentHTML: `<img src="images/wwd-newsletters.png" alt="A collage of digital newsletters displays several editions of AI NEWS with blue headers and various article titles. Visible sections include an AI-ENHANCED LEARNING INITIATIVE announcement, a guide on AI POWERED ACCESSIBILITY TOOLS, and a LIGHTNING ROUND summary of campus projects. The newsletters feature white backgrounds with blue and black text, providing information on topics like generating alt text and using AI as a metaphor for human learning." />`
            },
            {
                title: 'Professional Development',
                description: 'FLCC maintains a strategic calendar of in-person and remote AI training opportunities, with sessions cataloged for on-demand viewing so faculty and staff can learn at their own pace.',
                link: '',
                contentHTML: `<img src="images/wwd-professional-development.png" alt="A professional development webpage for the CENTER FOR TEACHING AND LEARNING features three course modules titled PROMPTING 101, MEDIA CREATION, and PROMPTING 201. Each section includes a descriptive paragraph about learning AI strategies and a thumbnail image overlaid with a diagonal blue banner and the CTL AI logo. The page provides external links to AI tools like Gemini, ChatGPT, and Meta AI to encourage faculty and staff engagement with new technologies." />`
            },
            {
                title: 'Vibe Coding Course',
                description: 'FLCC\'s full-semester Vibe Coding course gives non-CS majors a low-to-no-code pathway to build real solutions with AI, fulfilling both technology and AI literacy requirements without traditional programming barriers.',
                link: '',
                contentHTML: `<img src="images/wwd-vibe-coding.png" alt="A digital collage on a blue background features the stylized text VIBE CODING WITH AI surrounded by various screenshots of software applications. The collage includes a computer science quiz, a digital book cover, a hand-tracking interface with geometric overlays, an interactive periodic table, and a real-time world flight tracker map. This graphic illustrates diverse programming projects and educational tools that can be developed using artificial intelligence." />`

        function renderInitiatives() {
            const accordion = document.getElementById('initiatives-accordion');
            const display   = document.getElementById('initiative-display');
            if (!accordion || !display) return;

            // Build accordion HTML (first item open by default)
            accordion.innerHTML = initiatives.map((item, i) => `
                <div class="accordion-item">
                    <button class="accordion-btn${i === 0 ? ' active' : ''}" data-index="${i}" aria-expanded="${i === 0}">
                        ${item.title}
                        <i data-lucide="chevron-down" width="20" class="accordion-chevron"></i>
                    </button>
                    <div class="accordion-body">
                        <div class="accordion-body-inner">
                            ${item.description}
                            ${item.link ? `<br><a href="${item.link}" target="_blank" rel="noopener" class="init-launch-chip"><i data-lucide="external-link" width="13"></i> Launch <i data-lucide="arrow-right" width="13"></i></a>` : ''}
                            <div class="initiative-display initiative-display-inline">${item.contentHTML}</div>
                        </div>
                    </div>
                </div>
            `).join('');

            // Set initial content and open first body
            display.innerHTML = initiatives[0].contentHTML;
            applyImgTitles(display);
            initSliderAutoplay(display);
            applyImgTitles(accordion);
            const firstBody = accordion.querySelector('.accordion-body');
            firstBody.style.maxHeight = firstBody.scrollHeight + 'px';

            // Accordion click handler
            accordion.querySelectorAll('.accordion-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const idx       = parseInt(this.dataset.index);
                    const isActive  = this.classList.contains('active');
                    const allBtns   = accordion.querySelectorAll('.accordion-btn');
                    const allBodies = accordion.querySelectorAll('.accordion-body');

                    // Close all
                    allBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-expanded', 'false'); });
                    allBodies.forEach(b => { b.style.maxHeight = '0'; });

                    if (!isActive) {
                        // Open clicked item
                        this.classList.add('active');
                        this.setAttribute('aria-expanded', 'true');
                        this.nextElementSibling.style.maxHeight = this.nextElementSibling.scrollHeight + 'px';

                        // Swap right-side content with fade
                        clearSliderAutoplay(display);
                        display.classList.add('fading');
                        setTimeout(() => {
                            display.innerHTML = initiatives[idx].contentHTML;
                            display.classList.remove('fading');
                            lucide.createIcons();
                            applyImgTitles(display);
                            initSliderAutoplay(display);
                        }, 200);
                    }
                });
            });
        }

        renderInitiatives();
        lucide.createIcons();
        document.getElementById('footer-year').textContent = new Date().getFullYear();
    </script>
